name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: adeks
          POSTGRES_PASSWORD: adeks_test
          POSTGRES_DB: adeks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://adeks:adeks_test@localhost:5432/adeks_test
      NODE_ENV: test

    steps:
      # ── Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Install dependencies ─────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── TypeScript ───────────────────────────────────────────
      - name: Type check (backend)
        run: npm run type-check --workspace=apps/backend

      - name: Type check (frontend)
        run: npm run type-check --workspace=apps/frontend

      # ── Lint ─────────────────────────────────────────────────
      - name: Lint (backend)
        run: npm run lint --workspace=apps/backend

      - name: Lint (frontend)
        run: npm run lint --workspace=apps/frontend

      # ── Database / Prisma ────────────────────────────────────
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/backend

      # ── Tests ────────────────────────────────────────────────
      - name: Test (backend)
        run: npm run test --workspace=apps/backend

      - name: Test (frontend)
        run: npm run test --workspace=apps/frontend

      # ── Build ────────────────────────────────────────────────
      - name: Build (backend)
        run: npm run build --workspace=apps/backend

      - name: Build (frontend)
        run: npm run build --workspace=apps/frontend
